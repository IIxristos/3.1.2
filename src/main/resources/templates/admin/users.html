<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление пользователями</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f0f0f0; }
        .actions a { margin-right: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logout-form { display: inline; }
    </style>
</head>
<body>
<div class="header">
    <h1>Панель администратора</h1>
    <div>
        <a href="/admin/add">Добавить пользователя</a> |
        <a href="/">На главную</a> |
        <form class="logout-form" th:action="@{/logout}" method="post">
            <button type="submit">Выйти</button>
        </form>
    </div>
</div>

<h2>Список пользователей</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Логин</th>
        <th>Email</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Возраст</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.username}">user</td>
        <td th:text="${user.email}">email</td>
        <td th:text="${user.firstName}">Имя</td>
        <td th:text="${user.lastName}">Фамилия</td>
        <td th:text="${user.age}">25</td>
        <td th:text="${user.roles}">[ROLE_USER]</td>
        <td class="actions">
            <a th:href="@{/admin/edit/{id}(id=${user.id})}">Редактировать</a>
            <a th:href="@{/admin/delete/{id}(id=${user.id})}" onclick="return confirm('Удалить пользователя?')">Удалить</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
