<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить пользователя</title>
    <style>
        .form-group { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; }
        .container { max-width: 500px; }
        select { min-width: 150px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Добавление пользователя</h1>
    <form th:action="@{/admin/add}" th:object="${user}" method="post">
        <div class="form-group">
            <label>Логин:</label>
            <input type="text" th:field="*{username}" required />
        </div>
        <div class="form-group">
            <label>Пароль:</label>
            <input type="password" th:field="*{password}" required />
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}" required />
        </div>
        <div class="form-group">
            <label>Имя:</label>
            <input type="text" th:field="*{firstName}" required />
        </div>
        <div class="form-group">
            <label>Фамилия:</label>
            <input type="text" th:field="*{lastName}" required />
        </div>
        <div class="form-group">
            <label>Возраст:</label>
            <input type="number" th:field="*{age}" required />
        </div>
        <div class="form-group">
            <label>Роли:</label>
            <select multiple="multiple" name="roleIds">
                <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
            </select>
            <br/><small>Зажмите Ctrl для выбора нескольких</small>
        </div>
        <div class="form-group">
            <button type="submit">Сохранить</button>
            <a href="/admin">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
